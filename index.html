<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一筆書きスライドパズル</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>一筆書きスライドパズル</h1>
    
    <!-- サイズ選択エリア -->
    <div id="control-panel">
        <label for="size-select">盤面サイズ: </label>
        <select id="size-select" onchange="changeSize(this.value)">
            <option value="3">3 × 3 (壁1個)</option>
            <option value="4">4 × 4 (壁2個)</option>
            <option value="5">5 × 5 (壁3個)</option>
            <option value="6">6 × 6 (壁4個)</option> <!-- 6x6を追加！ -->
        </select>
    </div>

    <div id="message">1から8を通路で繋げよう！</div>
    
    <!-- 盤面と描画用のCanvasを重ねるためのラッパー -->
    <div id="game-container">
        <div id="puzzle-board"></div>
        <canvas id="path-canvas"></canvas>
    </div>

    <!-- ボタンを2つに分割 -->
    <div class="button-group">
        <button onclick="resetCurrentGame()" class="reset-btn">リセット</button>
        <button onclick="initGame()" class="regenerate-btn">再生成</button>
    </div>

    <!-- クリア時に表示するミニウィンドウ（モーダル） -->
    <div id="clear-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2>🎉 CLEAR!</h2>
            <p id="clear-message">見事に一筆書きが開通しました！</p>
            
            <!-- スコア表示エリア -->
            <div id="score-board">
                <p>クリア時間: <span id="clear-time" class="score-val">0</span> 秒</p>
                <p>クリック回数: <span id="click-count" class="score-val">0</span> 回</p>
            </div>

            <button onclick="closeModalAndReset()" class="modal-btn">もう一度遊ぶ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
